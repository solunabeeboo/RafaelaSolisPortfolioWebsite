</label> </div> <div class="edit-row"> <div class="edit-field"> <label class="edit-label" for="ef-embedType">Embed Type</label> <select id="ef-embedType" class="edit-select edit-input"> <option value="game">game</option> <option value="widget">widget</option> </select> </div> </div> <div class="edit-field"> <label class="edit-label" for="ef-embedUrl">Embed URL</label> <input type="url" id="ef-embedUrl" class="edit-input" placeholder="https://itch.io/embed/..."> </div> <div class="edit-field"> <label class="edit-label" for="ef-gradient">Background Gradient (CSS)</label> <input type="text" id="ef-gradient" class="edit-input" placeholder="linear-gradient(135deg, #667eea 0%, #764ba2 100%)"> </div> </div> <div class="edit-modal-footer"> <button id="editorDelete" class="edit-btn-danger" style="display:none">Delete Project</button> <div class="edit-modal-footer-right"> <button id="editorCancel" class="edit-btn-secondary">Cancel</button> <button id="editorSave" class="edit-btn-primary">Save Changes</button> </div> </div> </div> </div> <script>(function(){const projects = [{"title":"Rat Attack!","shortDescription":"Play as a seasoned exterminator in upstate New York, going into a job he will never forget.","fullDescription":"Rat Attack is a game about subverting expectation, and being open to change. The player takes the body of a seasoned exterminator in upstate New York, going into a job he will never forget. Through moments of fast-paced and challenging combat of trying to capture feral rats interlaced with longer calmer sections of storied exploration, the game intends to create a curious and captivating experience. This makes the game suitable for ages 10+ with a focus on the young adult / teen market, meant to be played on PC.\n\n\nFeatures\n • 3rd Person Gameplay\n • Intense Shooting Mechanics\n • Large Storied Exploration\n • Keyboard & Controller Support","tags":["Unity","C#","Action","Horror","Pixel Art","Puzzle","Singleplayer"],"developmentTime":"3 months","teamSize":"Solo project","tools":["Unity","C#","Git","Google Docs","Aseprite","Blender"],"challenges":"A large challenge with Rat Attack was getting down an asthetic that would create a unique and immersive atmosphere, without being too scopey or nauseating for the player.","learnings":"This academic project involved a massive amount of documentation, from creating multiple concepts and whittling them down, to visual system diagrams, and an entire GDD. This game helped connect all of the concepts between design and implementation, while allowing me to create a product I'm incredibly proud of.","image":"images/cc_wLMW7.png","screenshots":["screenshots/_wLMW7.png","screenshots/FCGsCU.png","screenshots/VT6R4w.png","screenshots/7R6Cxd.png","screenshots/Gl4uSU.png"],"playLink":"https://solunabeeboo.itch.io/rat-attack","linkText":"Play on Itch.io","hasEmbed":true,"embedType":"game","embedUrl":"https://itch.io/embed-upload/16803340","gradient":""},{"title":"Mega Market Mayhem","shortDescription":"A fast-paced multiplayer 1v1 fighting game where players compete to see who's on top with quirky and fun food based characters.","fullDescription":"Mega Market Mayhem is an intense multiplayer fighting game that combines fast-paced combat with quirky food-themed characters in a chaotic supermarket setting. Players engage in 1v1 battles using unique food-based fighters, each with their own special abilities and combat styles.\n\nKey Features:\n• Multiplayer 1v1 fighting mechanics\n• Unique food-based character roster\n• Dynamic supermarket environments\n• Special abilities and combo systems\n• Chaotic and fun gameplay designed for competitive play\n\nThe game focuses on accessible yet deep fighting mechanics, making it easy for newcomers to jump in while providing enough complexity for competitive players to master.","tags":["Unity","C#","Multiplayer","Action","Fighting"],"image":"images/megamarketmayhem.png","screenshots":["screenshots/mmm (1).png","screenshots/mmm (2).png","screenshots/mmm (3).png"],"gradient":"linear-gradient(135deg, #667eea 0%, #764ba2 100%)","playLink":"https://studio-212.itch.io/mega-market-mayhem","embedType":"game","embedUrl":"https://itch.io/embed-upload/15303000?color=333333","linkText":"Play on itch.io","hasEmbed":true,"developmentTime":"9 months","teamSize":"Team of 7-10","tools":["Unity 2022.3","C#","Photoshop","Git","Jira","Notion","Google Suite"],"challenges":"The biggest challenge was creating a gold-plated attack system that could sync up it's hits and expressive motions to the level's soundtrack.","learnings":"This project taught me an incredible amount about multiplayer game architecture and the importance of responsive combat systems, as well as the affects of product management software and how to help team memebers manage workload."},{"title":"Scriptorium","shortDescription":"An immersive narrative dungeon crawler where one must draw to attack, utilizing advanced neural model recognition.","fullDescription":"Scriptorium is an innovative dungeon crawler that revolutionizes combat through drawing mechanics. Players must physically draw symbols and patterns to cast spells and perform attacks, using advanced neural network recognition to interpret their drawings in real-time.\n\nInnovative Features:\n• Neural network-powered drawing recognition\n• Learn a unique 'language' of combat through drawing\n• Immersive narrative-driven progression\n• Roguelite elements with procedural dungeons\n• Strategic spell combinations through drawing\n\nThe game combines traditional dungeon crawling with cutting-edge AI technology, creating a truly unique gameplay experience that feels both familiar and revolutionary.","tags":["Unity 6","C#","Narrative","Action","Roguelite","Bloody"],"image":"images/scriptorium.png","screenshots":["screenshots/scriptorium (1).png","screenshots/scriptorium (5).mp4","screenshots/scriptorium (2).png","screenshots/scriptorium (3).png","screenshots/scriptorium (4).png"],"gradient":"linear-gradient(135deg, #f093fb 0%, #f5576c 100%)","playLink":"https://studio-212.itch.io/project-dungeon","linkText":"Play on itch.io","hasEmbed":true,"embedType":"widget","embedUrl":"https://itch.io/embed/3904438","developmentTime":"2.25 months [ONGOING]","teamSize":"Team of 5","tools":["Unity 6","C#","TensorFlow","Keras","Aseprite","Python","Photoshop","Taiga.io","Discord","Github Actions","Git"],"challenges":"Integrating neural network recognition for drawing input while maintaining responsive gameplay was extremely challenging.","learnings":"This project expanded my knowledge of machine learning integration in games and real-time input processing."},{"title":"Mazetastic Colors","shortDescription":"A strategic yet multi-leveled fun maze game focused around matching colors and finding the exit!","fullDescription":"Mazetastic Colors combines traditional maze navigation with color-based puzzle mechanics, creating a unique and challenging gameplay experience across multiple levels of increasing complexity.\n\nGameplay Features:\n• Strategic maze navigation with color-matching mechanics\n• Multiple levels with progressively complex layouts\n• Color-based puzzle solving elements\n• Strategic thinking required to find optimal paths\n• Clean, accessible visual design\n• Satisfying progression system\n\nThe game challenges players to think both spatially and strategically, combining pathfinding skills with color logic puzzles.","tags":["Unity","C#","Academic","2D","Puzzle","Maze","Color Based Puzzles"],"image":"images/mazegame.png","screenshots":["screenshots/maze (1).png","screenshots/maze (2).png","screenshots/maze (3).png"],"gradient":"linear-gradient(135deg, #f093fb 0%, #f5576c 100%)","playLink":"https://solunabeeboo.itch.io/mazetastic-colors","embedUrl":"https://itch.io/embed-upload/15301466?color=ca50c5","linkText":"View on Itch.io","hasEmbed":true,"embedType":"game","developmentTime":"2 weeks","teamSize":"Solo project","tools":["Unity 2022.3","C#","Adobe Illustrator","Aseprite"],"challenges":"Designing levels that balanced maze complexity with color puzzle difficulty without overwhelming players, as well as using colors that players could differentiate","learnings":"This project taught me about puzzle design principles and creating intuitive yet challenging gameplay."},{"title":"Falsehoods","shortDescription":"Falsehoods is a 2D-top down stealth-based game, expose the cult, save the town.","fullDescription":"Falsehoods is a 2D-top down stealth-based game where you, a grungy detective ready to retire, investigates a mysterious cult that’s been linked to hundreds of kidnappings over the last century. You must navigate through their elaborate estate just outside of town, carefully avoiding detection, while gathering enough evidence to put them away for good. \n\n  •  Producer: Rafaela Solis     (+ Programming & Design support)\n  •  Programmer: Luke Hinojosa\n  •  Designer: Nicholas Funk\n  •  Artist: Rhiannon Haut\n  •  Sound: Heather Deruyck","tags":["Unity","C#","Agile","Academic","Team","2D","Scary","Top-Down","Game Architecture"],"developmentTime":"5 weeks","teamSize":"Team of 5","tools":["Unity","C#","Git","Confluence","Jira","Mattermost","Google Calender"],"challenges":"This project was by far the largest and most important where I've taken on a producer role. While I still did design and game architecture, my daily work was organizing the team and making sure communication and the Agile workflow all came together seamlessly.","learnings":"I learned a massive amount about the intricacies of working on an unfamiliar team. I realized how important it is for a creative team to get comfortable with each other, and the critical need for everyone's voice to be heard in the design process for both product quality and scope's sake.","image":"images/Screenshot 2026-03-14 160608.png","screenshots":["screenshots/Recording 2026-03-01 233729.gif","screenshots/Recording 2026-03-01 233432.gif","screenshots/Recording 2026-03-01 233146.gif","screenshots/Recording 2026-03-01 232919 (1).gif","screenshots/Recording 2026-03-01 232317.gif","screenshots/Recording 2026-03-01 231946.gif"],"playLink":"https://lukarbonite.itch.io/falsehoods","linkText":"View on Itch.io","hasEmbed":true,"embedType":"game","embedUrl":"https://itch.io/embed-upload/16663003","gradient":""},{"title":"Valentine Bash","shortDescription":"A strategic and fast based vertical shooter, kill the bugs trying to kill love and save valentine's day!","fullDescription":"Valentine Bash is a fast-paced vertical shooter with a romantic twist! Players must defend love itself by eliminating waves of bugs that threaten to destroy Valentine's Day. The game combines classic arcade shooter mechanics with strategic elements and multi-camera rendering.\n\nGame Features:\n• Fast-paced vertical shooting action\n• Strategic enemy patterns and wave design\n• Multiple levels with increasing difficulty\n• Multi-camera rendering system for dynamic perspectives\n• Valentine's Day themed art and story\n• Color saturation based progression system\n\nThe game captures the intensity of classic arcade shooters while adding modern polish and strategic depth.","tags":["Unity","C#","Academic","2D","Action","Vertical Shooter","Multi-Leveled","Multi-Camera Rendering"],"image":"images/valentinebash.png","screenshots":["screenshots/vertshooter (1).png","screenshots/vertshooter (2).png","screenshots/vertshooter (3).png"],"gradient":"linear-gradient(135deg, #f093fb 0%, #f5576c 100%)","playLink":"https://solunabeeboo.itch.io/valentine-bash","linkText":"View on Itch.io","hasEmbed":true,"embedType":"game","embedUrl":"https://itch.io/embed-upload/15301923?color=fec7f2","developmentTime":"2 weeks","teamSize":"Solo project","tools":["Unity 2022.3","C#","Aseprite"],"challenges":"Implementing smooth multi-camera rendering while maintaining consistent performance across different devices.","learnings":"This project improved my understanding of camera systems and performance optimization in Unity."},{"title":"Fishing For Fun","shortDescription":"A fun arcade style shooter-looter, use your harpoon to swing around the level collecting fish and upgrading your stats!","fullDescription":"Fishing For Fun combines arcade shooting mechanics with looter progression systems, creating a unique experience where players use a harpoon both as a weapon and a traversal tool. The game focuses on fluid movement and satisfying collection mechanics.\n\nCore Mechanics:\n• Harpoon-based movement and combat system\n• Arcade-style shooting with physics-based projectiles\n• Loot collection and character progression\n• Swinging mechanics for dynamic traversal\n• Stat upgrades and equipment systems\n• Multiple level environments with different challenges\n• High-score based arcade progression","tags":["Unreal Engine","Blueprints","Academic","3D","Shooter-Looter","Arcade"],"image":"images/fishingforfun.png","screenshots":["screenshots/fish (1).png","screenshots/fish (2).png","screenshots/fish (3).png"],"gradient":"linear-gradient(135deg, #f093fb 0%, #f5576c 100%)","playLink":"https://solunabeeboo.itch.io/fishing-for-fun","linkText":"View on Itch.io","hasEmbed":true,"embedType":"widget","embedUrl":"https://itch.io/embed/3974978","developmentTime":"3 weeks","teamSize":"Solo project","tools":["Unreal Engine","Blueprints","Blender","Aseprite"],"challenges":"Creating responsive harpoon physics that felt good for both movement and combat, as well as modifying unreal template blueprints to inject the new systems, all within the multiplayer Lyra framework.","learnings":"This project improved my understanding of physics-based gameplay and arcade game design principles, and taught me a lot about the quirks of Unreal Engine."},{"title":"Bender Man","shortDescription":"A silly collecting game parodying the Slender Man series, collect the pages before he gets you!","fullDescription":"Bender Man is a humorous parody of the classic Slender Man horror games, turning the terrifying concept into a lighthearted collecting adventure. Players must gather scattered pages while avoiding the comically reimagined antagonist.\n\nParody Elements:\n• Playful take on classic horror game mechanics\n• Collecting gameplay with a twist of humor\n• 3D environments that both honor and subvert the original\n• Survival mechanics with comedic timing\n• Easter eggs and references to the original series\n• Accessible horror that's more fun than frightening\n\nThe game demonstrates how familiar mechanics can be transformed through tone and presentation to create entirely different experiences.","tags":["Unreal Engine","Blueprints","Academic","3D","Collecting","Survival"],"image":"images/benderman.png","screenshots":["screenshots/bender (1).jpg","screenshots/bender (2).jpg","screenshots/bender (3).jpg"],"gradient":"linear-gradient(135deg, #f093fb 0%, #f5576c 100%)","playLink":"https://solunabeeboo.itch.io/bender-man-the-something-something","linkText":"View on Itch.io","embedType":"widget","embedUrl":"https://itch.io/embed/3974963","hasEmbed":true,"developmentTime":"3 weeks","teamSize":"Solo project","tools":["Unreal Engine","Blueprints","Blender"],"challenges":"Balancing parody elements with actual engaging gameplay mechanics.","learnings":"This project taught me about tone and how presentation can completely change a player's experience."},{"title":"OpenGL Environments","shortDescription":"Scenes and textures coded in C++ and OpenGL.","fullDescription":"A collection of 3D scenes and environments built from scratch using C++ and OpenGL, demonstrating low-level graphics programming and mathematical concepts in computer graphics.\n\nTechnical Achievements:\n• Custom 3D rendering pipeline\n• Texture mapping and lighting systems\n• Shader programming (vertex and fragment)\n• Mathematical transformations and camera systems\n• Real-time rendering optimizations\n• Multiple scene compositions with different themes\n\nThese projects showcase the fundamentals of computer graphics programming and the mathematical principles that power modern game engines.","tags":["OpenGL","C++","Academic","3D","2D","Textures","Math"],"image":"images/opengl.png","screenshots":["screenshots/BeachScene(1).mp4","screenshots/opengl (2).mp4","screenshots/opengl (1).mp4","screenshots/opengl (5).mp4","screenshots/opengl (3).mp4","screenshots/opengl (4).mp4"],"gradient":"linear-gradient(135deg, #f093fb 0%, #f5576c 100%)","playLink":"https://github.com/solunabeeboo/OpenGL-Work","linkText":"View Code on GitHub","hasEmbed":true,"embedType":"widget","embedUrl":"https://rafaelasolis.work/embeds/github-widget.html?user=solunabeeboo&repo=OpenGL-Work","developmentTime":"1 semester","teamSize":"Solo project","tools":["OpenGL","C++","GLFW","GLEW","GLM"],"challenges":"Understanding the mathematical foundations of 3D graphics and implementing efficient rendering pipelines.","learnings":"This project gave me deep insight into how modern graphics engines work under the hood."},{"title":"Scrum Facilitation","shortDescription":"The various tools I've created, researched, and implemented into team use to more easily facilitate the agile / scrum workflow.","fullDescription":"A comprehensive collection of tools, processes, and implementations designed to streamline agile and scrum workflows in game development teams. This project represents ongoing research and practical application of project management methodologies.\n\nTools & Implementations:\n• Custom sprint planning and tracking tools\n• Retrospective facilitation frameworks\n• Integration tools for development workflows\n\nSpecifically, this is an example of a tool I made that read our Taiga board (Jira Alternative), and posted automated daily standups for an asynchronous workflow. It generated its won board image using what it read and Github Actions to help facilitate teamwork.","tags":["Scrum","Agile","Python"],"image":"images/503815079-d1d027ba-d380-4e18-993c-73600280d486.png","screenshots":["screenshots/Screenshot 2026-03-14 154847.png","screensh                 const inner = isVideo(src)

                    : `<img ${load ? `src="${src}"` : `data-src="${src}"`} alt="" loading="lazy" onerror="this.style.display='none'">`;
                return `<div class="strip-thumb-slide${idx === 0 ? ' active' : ''}">${inner}</div>`;
            }).join('');
        }

        function initScrollEngine() {
            const stage = document.getElementById('sectionsStage');
            let ticking = false;
            let lastActiveIdx = -1;

            function update() {
                if (isMobile) { ticking = false; return; }

                const strips = Array.from(stage.querySelectorAll('.section-strip'));
                const N = strips.length;
                if (!N) { ticking = false; return; }

                const stageH   = window.innerHeight - NAV_H;
                const heroH    = stageH * HERO_FRAC;
                const otherH   = N > 1 ? (stageH - heroH) / (N - 1) : 0;
                const bufPx    = BUF_VH * window.innerHeight;
                const secPx    = SEC_VH * window.innerHeight;
                const slotSize = 1 + HERO_HOLD;
                const scrollY  = window.scrollY;

                const heights = new Array(N).fill(otherH);
                let activeIdx = -1;

                if (scrollY <= bufPx) {
                    const t      = bufPx > 0 ? scrollY / bufPx : 1;
                    const equalH = stageH / N;
                    const h0     = equalH + (heroH - equalH) * t;
                    const hRest  = N > 1 ? (stageH - h0) / (N - 1) : 0;
                    heights[0]   = h0;
                    for (let i = 1; i < N; i++) heights[i] = hRest;
                    activeIdx = h0 >= heroH ? 0 : -1;
                } else {
                    const frac     = (scrollY - bufPx) / secPx;
                    const slotIdx  = Math.floor(frac / slotSize);
                    const slotFrac = frac - slotIdx * slotSize;
                    const lo       = Math.min(slotIdx, N - 1);

                    if (lo >= N - 1) {
                        heights[N - 1] = heroH;
                        for (let i = 0; i < N - 1; i++) heights[i] = otherH;
                        activeIdx = N - 1;
                    } else if (slotFrac <= HERO_HOLD) {
                        heights[lo] = heroH;
                        for (let i = 0; i < N; i++) if (i !== lo) heights[i] = otherH;
                        activeIdx = lo;
                    } else {
                        const t  = slotFrac - HERO_HOLD;
                        const hi = lo + 1;
                        heights[lo] = heroH * (1 - t) + otherH * t;
                        heights[hi] = otherH * (1 - t) + heroH * t;
                        for (let i = 0; i < N; i++) {
                            if (i !== lo && i !== hi) heights[i] = otherH;
                        }
                        activeIdx = t < 0.5 ? lo : hi;
                    }
                }

                strips.forEach((s, i) => {
                    s.style.height = Math.max(0, heights[i]) + 'px';
                    s.classList.toggle('strip-active', i === activeIdx);
                });

                // Lazy-load media when a new strip comes into focus
                if (activeIdx !== lastActiveIdx) {
                    if (activeIdx >= 0) {
                        loadStripMedia(strips[activeIdx]);
                        // Prefetch neighbors so they're ready when scrolled to
                        if (strips[activeIdx - 1]) loadStripMedia(strips[activeIdx - 1]);
                        if (strips[activeIdx + 1]) loadStripMedia(strips[activeIdx + 1]);
                    }
                    lastActiveIdx = activeIdx;
                }

                ticking = false;
            }

            window.addEventListener('scroll', () => {
                if (!ticking) { requestAnimationFrame(update); ticking = true; }
            }, { passive: true });

            window.addEventListener('resize', () => {
                checkMobile();
                if (!isMobile) {
                    const stage  = document.getElementById('sectionsStage');
                    const driver = document.getElementById('scrollDriver');
                    const N = stage.querySelectorAll('.section-strip').length;
                    const slotSize = 1 + HERO_HOLD;
                    stage.style.height  = (window.innerHeight - NAV_H) + 'px';
                    driver.style.height = ((BUF_VH + N * slotSize * SEC_VH) * window.innerHeight) + 'px';
                    requestAnimationFrame(update);
                }
            });

            update();
        }

        function openGameEmbed(url, title, nativeW = 960, nativeH = 600) {
            const overlay = document.getElementById('playOverlay');
            const iframe  = document.getElementById('playIframe');
            document.getElementById('playOverlayTitle').textContent = title || '';
            iframe.style.transform = '';   // reset any previous scale
            overlay.style.display = 'flex';

            requestAnimationFrame(() => {
                const wrap = overlay.querySelector('.play-iframe-wrap');
                const { width: cw, height: ch } = wrap.getBoundingClientRect();

                let finalUrl = url;
                if (url.includes('embed-upload')) {
                    // Force black background so itch.io padding blends with our overlay
                    finalUrl = finalUrl.replace(/[?&]color=[^&]*/i, '');
                    const sep = finalUrl.includes('?') ? '&' : '?';
                    finalUrl += `${sep}color=000000`;

                    // Scale so the canvas fits inside the container (letterbox if needed).
                    // scaleY is based on nativeH only — the itch.io footer hangs below
                    // the container border (overflow:visible) and stays fully clickable.
                    const scaleX = cw / nativeW;
                    const scaleY = ch / nativeH;
                    const scale  = Math.min(scaleX, scaleY);
                    const ox = (cw - nativeW  * scale) / 2;
                    const oy = (ch - nativeH  * scale) / 2;
                    iframe.style.transform = `translate(${ox}px,${oy}px) scale(${scale})`;
                    iframe.style.width  = nativeW + 'px';
                    iframe.style.height = (nativeH + 42) + 'px';
                }

                iframe.src = finalUrl;
            });
        }

            document.getElementById('playOverlay').style.display = 'none';

                // Edit button
                const btn = document.createElement('button');
                btn.className = 'strip-edit-btn';
                btn.textContent = '✎ Edit';
                btn.dataset.idx = i;
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    openEditor(parseInt(btn.dataset.idx));
                });
                strip.querySelector('.strip-header').appendChild(btn);

                // Reorder buttons
                const wrap = document.createElement('div');
                wrap.className = 'strip-reorder-btns';
                const upBtn   = document.createElement('button');
                const downBtn = document.createElement('button');
                upBtn.className = downBtn.className = 'strip-reorder-btn';
                upBtn.textContent = '▲'; downBtn.textContent = '▼';
                upBtn.title   = 'Move up';   downBtn.title = 'Move down';
                upBtn.disabled   = (i === 0);
                downBtn.disabled = (i === total - 1);
                upBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    if (idx === 0) return;
                    [liveProjects[idx - 1], liveProjects[idx]] = [liveProjects[idx], liveProjects[idx - 1]];
                    saveToAPI();
                    rebuildAfterEdit();
                });
                downBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    if (idx >= liveProjects.length - 1) return;
                    [liveProjects[idx], liveProjects[idx + 1]] = [liveProjects[idx + 1], liveProjects[idx]];
                    saveToAPI();
                    rebuildAfterEdit();
                });
                wrap.appendChild(upBtn);
                wrap.appendChild(downBtn);
                strip.querySelector('.strip-header').appendChild(wrap);
            });
        }

        function exitEditMode() {
            editMode = false;
            document.body.classList.remove('edit-mode');
            document.getElementById('editToolbar').style.display = 'none';
        }

        document.getElementById('exitEditBtn').addEventListener('click', exitEditMode);
        document.getElementById('addProjectBtn').addEventListener('click', () => openEditor(null));

        // ── Rebuild strips after edit ──────────────────────────────────────────
        function rebuildAfterEdit() {
            buildStrips(liveProjects);
            snapshotIconHeights();
            if (editMode) attachEditButtons();
            window.dispatchEvent(new Event('scroll'));
        }

        // ── Editor modal ──────────────────────────────────────────────────────
        function openEditor(idx) {
            editingIdx = idx;
            const p = idx !== null ? liveProjects[idx] : {};

            document.getElementById('editorTitle').textContent =
                idx !== null ? `Edit: ${p.title || '(untitled)'}` : 'New Project';
            document.getElementById('editorDelete').style.display =
                idx !== null ? 'block' : 'none';

            // Basic
            document.getElementById('ef-title').value       = p.title || '';
            document.getElementById('ef-shortDesc').value   = p.shortDescription || '';
            document.getElementById('ef-fullDesc').value    = p.fullDescription || '';
            document.getElementById('ef-tags').value        = (p.tags || []).join(', ');
            document.getElementById('ef-devTime').value     = p.developmentTime || '';
            document.getElementById('ef-teamSize').value    = p.teamSize || '';
            document.getElementById('ef-tools').value       = (p.tools || []).join(', ');
            document.getElementById('ef-challenges').value  = p.challenges || '';
            document.getElementById('ef-learnings').value   = p.learnings || '';

            // Links
            document.getElementById('ef-playLink').value    = p.playLink || '';
            document.getElementById('ef-linkText').value    = p.linkText || '';
            document.getElementById('ef-hasEmbed').checked  = p.hasEmbed || false;
            document.getElementById('ef-embedType').value   = p.embedType || 'game';
            document.getElementById('ef-embedUrl').value    = p.embedUrl || '';
            document.getElementById('ef-gradient').value    = p.gradient || '';

            // Media
            editScreenshots = [...(p.screenshots || [])];
            renderIconPreview(p.image || '');
            document.getElementById('ef-iconUrl').value = p.image || '';
            renderMediaList();

            switchTab('basic');
            document.getElementById('projectEditorModal').style.display = 'flex';
        }

        function closeEditor() {
            document.getElementById('projectEditorModal').style.display = 'none';
        }

        document.getElementById('editorClose').addEventListener('click', closeEditor);
        document.getElementById('editorCancel').addEventListener('click', closeEditor);

        // Close on backdrop click
        document.getElementById('projectEditorModal').addEventListener('click', e => {
            if (e.target === document.getElementById('projectEditorModal')) closeEditor();
        });
        document.getElementById('passwordModal').addEventListener('click', e => {
            if (e.target === document.getElementById('passwordModal')) hidePasswordModal();
        });

        // ── Tabs ──────────────────────────────────────────────────────────────
        document.querySelectorAll('.edit-tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });

        function switchTab(name) {
            document.querySelectorAll('.edit-tab').forEach(t =>
                t.classList.toggle('active', t.dataset.tab === name));
            document.querySelectorAll('.edit-tab-content[data-tab]').forEach(c =>
                c.style.display = c.dataset.tab === name ? 'flex' : 'none');
        }

        // ── Icon preview ──────────────────────────────────────────────────────
        document.getElementById('ef-iconUrl').addEventListener('input', e =>
            renderIconPreview(e.target.value));

        document.getElementById('ef-iconUploadBtn').addEventListener('click', () =>
            document.getElementById('ef-iconUpload').click());

        document.getElementById('ef-iconUpload').addEventListener('change', async e => {
            const file = e.target.files[0];
            if (!file) return;
            const result = await uploadFile(file, 'images');
            if (result) {
                document.getElementById('ef-iconUrl').value = result;
                renderIconPreview(result);
            }
            e.target.value = '';
        });

        function renderIconPreview(src) {
            document.getElementById('ef-iconPreview').style.backgroundImage =
                src ? `url('${src}')` : 'none';
        }

        // ── Media list ────────────────────────────────────────────────────────
        function renderMediaList() {
            const list = document.getElementById('ef-mediaList');
            list.innerHTML = '';
            if (!editScreenshots.length) {
                list.innerHTML = '<p style="font-size:0.75rem;color:var(--text-muted);margin:0">No screenshots yet</p>';
                return;
            }
            editScreenshots.forEach((src, i) => {
                const item = document.createElement('div');
                item.className = 'media-item';
                const vid = isVideo(src);
                const thumbEl = vid
                    ? `<div class="media-item-thumb-vid">VIDEO</div>`
                    : `<img class="media-item-thumb" src="${src}" alt="" onerror="this.style.opacity=0.2">`;
                item.innerHTML = `
                    ${thumbEl}
                    <span class="media-item-name" title="${src}">${src.split('/').pop()}</span>
                    <div class="media-item-btns">
                        <button class="media-item-btn" data-action="up"   data-idx="${i}" ${i === 0 ? 'disabled style="opacity:0.3"' : ''}>↑</button>
                        <button class="media-item-btn" data-action="down" data-idx="${i}" ${i === editScreenshots.length - 1 ? 'disabled style="opacity:0.3"' : ''}>↓</button>
                        <button class="media-item-btn del" data-action="del" data-idx="${i}">✕</button>
                    </div>`;
                list.appendChild(item);
            });

            list.querySelectorAll('[data-action]:not([disabled])').forEach(btn => {
                btn.addEventListener('click', () => {
                    const i = parseInt(btn.dataset.idx);
                    if (btn.dataset.action === 'up') {
                        [editScreenshots[i - 1], editScreenshots[i]] = [editScreenshots[i], editScreenshots[i - 1]];
                    } else if (btn.dataset.action === 'down') {
                        [editScreenshots[i], editScreenshots[i + 1]] = [editScreenshots[i + 1], editScreenshots[i]];
                    } else if (btn.dataset.action === 'del') {
                        editScreenshots.splice(i, 1);
                    }
                    renderMediaList();
                });
            });
        }

        document.getElementById('ef-addMediaUpload').addEventListener('click', () =>
            document.getElementById('ef-mediaUpload').click());

        document.getElementById('ef-addMediaUrl').addEventListener('click', () => {
            const url = prompt('Enter image or video URL (or path relative to /projects/):');
            if (url && url.trim()) {
                editScreenshots.push(url.trim());
                renderMediaList();
            }
        });

        document.getElementById('ef-mediaUpload').addEventListener('change', async e => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const result = await uploadFile(file, 'screenshots');
                if (result) editScreenshots.push(result);
            }
            renderMediaList();
            e.target.value = '';
        });

        // ── File upload helper ────────────────────────────────────────────────
        async function uploadFile(file, subfolder) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = async ev => {
                    const safe = file.name.replace(/[^a-z0-9._\-() ]/gi, '_');
                    try {
                        const resp = await fetch('/api/upload', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ subfolder, filename: safe, data: ev.target.result })
                        });
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const json = await resp.json();
                        resolve(json.path); // e.g. "screenshots/game.png"
                    } catch (err) {
                        alert('Upload failed: ' + err.message + '\n\nNote: uploads only work in dev mode (astro dev).');
                        resolve(null);
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        // ── Collect form data ─────────────────────────────────────────────────
        function collectFormData() {
            const existing = editingIdx !== null ? liveProjects[editingIdx] : {};
            return {
                ...existing,
                title:            document.getElementById('ef-title').value.trim(),
                shortDescription: document.getElementById('ef-shortDesc').value.trim(),
                fullDescription:  document.getElementById('ef-fullDesc').value.trim(),
                tags:             document.getElementById('ef-tags').value.split(',').map(t => t.trim()).filter(Boolean),
                developmentTime:  document.getElementById('ef-devTime').value.trim(),
                teamSize:         document.getElementById('ef-teamSize').value.trim(),
                tools:            document.getElementById('ef-tools').value.split(',').map(t => t.trim()).filter(Boolean),
                challenges:       document.getElementById('ef-challenges').value.trim(),
                learnings:        document.getElementById('ef-learnings').value.trim(),
                image:            document.getElementById('ef-iconUrl').value.trim(),
                screenshots:      [...editScreenshots],
                playLink:         document.getElementById('ef-playLink').value.trim(),
                linkText:         document.getElementById('ef-linkText').value.trim(),
                hasEmbed:         document.getElementById('ef-hasEmbed').checked,
                embedType:        document.getElementById('ef-embedType').value,
                embedUrl:         document.getElementById('ef-embedUrl').value.trim(),
                gradient:         document.getElementById('ef-gradient').value.trim(),
            };
        }

        // ── Save ──────────────────────────────────────────────────────────────
        document.getElementById('editorSave').addEventListener('click', async () => {
            const data = collectFormData();
            if (!data.title) { alert('Title is required.'); return; }
            if (editingIdx !== null) {
                liveProjects[editingIdx] = data;
            } else {
                liveProjects.push(data);
            }
            await saveToAPI();
            closeEditor();
            rebuildAfterEdit();
        });

        // ── Delete ────────────────────────────────────────────────────────────
        document.getElementById('editorDelete').addEventListener('click', async () => {
            const title = liveProjects[editingIdx]?.title || 'this project';
            if (!confirm(`Delete "${title}"?\n\nThis cannot be undone.`)) return;
            liveProjects.splice(editingIdx, 1);
            await saveToAPI();
            closeEditor();
            rebuildAfterEdit();
        });

        // ── POST projects.json to API ──────────────────────────────────────────
        async function saveToAPI() {
            try {
                const resp = await fetch('/api/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projects: liveProjects })
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            } catch (err) {
                alert('Could not save to API: ' + err.message +
                    '\n\nNote: saving only works in dev mode (astro dev).\nYour changes are applied locally for this session.');
            }
        }
    })();</script>  <footer> <p>&copy; 2026 Rafaela Solis. All rights reserved.</p> </footer> <script type="module">const t=document.getElementById("burgerMenu"),e=document.getElementById("mobileMenu");t.addEventListener("click",()=>{t.classList.toggle("active"),e.classList.toggle("active")});e.querySelectorAll("a").forEach(c=>c.addEventListener("click",()=>{t.classList.remove("active"),e.classList.remove("active")}));e.addEventListener("click",c=>{c.target===e&&(t.classList.remove("active"),e.classList.remove("active"))});</script> </body> </html>
